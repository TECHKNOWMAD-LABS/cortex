name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linters
        run: pip install ruff mypy
      - name: Run ruff (lint + format check)
        run: ruff check . --output-format=github
      - name: Run ruff format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run tests
        run: pytest --tb=short -q 2>&1 || echo "No tests found - skipping"

  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate SKILL.md files exist
        run: |
          echo "Checking all skills have SKILL.md..."
          MISSING=0
          for dir in skills/*/; do
            if [ ! -f "${dir}SKILL.md" ]; then
              echo "MISSING: ${dir}SKILL.md"
              MISSING=1
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            echo "Some skills are missing SKILL.md files"
            exit 1
          fi
          echo "All skills have SKILL.md"
      - name: Check for stub files
        run: |
          echo "Checking for placeholder stubs..."
          STUBS=0
          for f in $(find skills -name "*.py" -size -100c); do
            if grep -q '{.*CONTENT.*}' "$f" 2>/dev/null; then
              echo "STUB DETECTED: $f"
              STUBS=1
            fi
          done
          if [ "$STUBS" -eq 1 ]; then
            exit 1
          fi
          echo "No stubs found"
