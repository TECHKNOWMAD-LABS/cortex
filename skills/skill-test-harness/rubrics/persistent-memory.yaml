# Rubric for persistent-memory
# Used by eval_judge.py to customize evaluation weights

skill_context: "Focus on sub-15ms latency at 10k entries and correct FTS5 queries."

# Weight overrides (must sum to ~1.0)
weights:
  correctness: 0.25
  reasoning_depth: 0.20
  completeness: 0.25
  hallucination_risk: 0.20
  coherence: 0.10

# Score interpretation
passing_threshold: 0.65
excellence_threshold: 0.85
